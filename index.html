<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#03030a">
<title>NEON SERPENT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;800&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    width:100%; height:100%;
    background:#03030a; overflow:hidden;
    touch-action:none; overscroll-behavior:none;
    -webkit-user-select:none; user-select:none;
    font-family:'Orbitron', ui-sans-serif, system-ui, sans-serif;
    color:#cfefff;
  }
  #game { position:fixed; inset:0; width:100vw; height:100vh; display:block; }
  #vignette {
    position:fixed; inset:0; pointer-events:none; z-index:2;
    background:radial-gradient(ellipse at center, transparent 55%, rgba(0,0,12,.55) 100%);
  }
  #hud {
    position:fixed; top:calc(10px + env(safe-area-inset-top)); left:14px; z-index:3;
    pointer-events:none; line-height:1.5; letter-spacing:.12em;
    font-size:13px; font-weight:500;
    text-shadow:0 0 8px rgba(0,240,255,.8), 0 0 24px rgba(0,240,255,.4);
  }
  #hud b { font-weight:800; color:#fff; }
  .overlay {
    position:fixed; inset:0; z-index:4;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:20px; text-align:center; padding:24px;
    background:rgba(2,3,12,.55); backdrop-filter:blur(4px); -webkit-backdrop-filter:blur(4px);
  }
  .hidden { display:none !important; }
  h1 {
    font-size:clamp(34px, 8vw, 72px); font-weight:800; letter-spacing:.14em;
    color:#fff;
    text-shadow:0 0 10px #00f0ff, 0 0 30px #00f0ff, 0 0 70px rgba(255,45,247,.8);
  }
  .sub { font-size:clamp(11px, 2.4vw, 14px); letter-spacing:.28em; color:#8fe7ff; opacity:.85; }
  .hint { font-size:clamp(10px, 2.2vw, 13px); letter-spacing:.1em; color:#9ad; opacity:.8; max-width:520px; line-height:1.8; }
  .btn {
    font-family:inherit; font-weight:800; font-size:clamp(15px,3vw,19px); letter-spacing:.22em;
    color:#00f0ff; background:transparent; cursor:pointer;
    padding:14px 44px; border:2px solid #00f0ff; border-radius:999px;
    text-shadow:0 0 10px #00f0ff;
    box-shadow:0 0 14px rgba(0,240,255,.55), inset 0 0 14px rgba(0,240,255,.25);
    transition:transform .12s ease, box-shadow .12s ease;
  }
  .btn:hover { transform:scale(1.05); box-shadow:0 0 26px rgba(0,240,255,.9), inset 0 0 20px rgba(0,240,255,.4); }
  .btn:active { transform:scale(.97); }
  .btn:focus-visible { outline:2px solid #fff; outline-offset:4px; }
  #dead h1 { text-shadow:0 0 10px #ff3355, 0 0 30px #ff3355, 0 0 70px rgba(255,51,85,.8); }
  .score-line { font-size:clamp(16px,4vw,24px); font-weight:800; letter-spacing:.2em; color:#fff;
    text-shadow:0 0 12px rgba(255,230,0,.9); }
  #boostBtn {
    position:fixed; left:calc(18px + env(safe-area-inset-left)); bottom:calc(28px + env(safe-area-inset-bottom));
    z-index:3; width:86px; height:86px; border-radius:50%;
    display:none; align-items:center; justify-content:center;
    font-family:inherit; font-weight:800; font-size:12px; letter-spacing:.14em;
    color:#ffe600; background:rgba(255,230,0,.06);
    border:2px solid rgba(255,230,0,.8);
    box-shadow:0 0 16px rgba(255,230,0,.4), inset 0 0 16px rgba(255,230,0,.15);
    text-shadow:0 0 8px rgba(255,230,0,.9);
    touch-action:none; -webkit-tap-highlight-color:transparent;
  }
  #boostBtn.on {
    background:rgba(255,230,0,.22);
    box-shadow:0 0 30px rgba(255,230,0,.85), inset 0 0 24px rgba(255,230,0,.35);
  }
  #stick {
    position:fixed; right:calc(18px + env(safe-area-inset-right)); bottom:calc(22px + env(safe-area-inset-bottom));
    z-index:3; width:140px; height:140px; border-radius:50%;
    display:none;
    background:rgba(0,240,255,.05);
    border:2px solid rgba(0,240,255,.5);
    box-shadow:0 0 16px rgba(0,240,255,.3), inset 0 0 20px rgba(0,240,255,.1);
    touch-action:none; -webkit-tap-highlight-color:transparent;
  }
  #stickKnob {
    position:absolute; left:50%; top:50%;
    width:56px; height:56px; margin:-28px 0 0 -28px; border-radius:50%;
    background:rgba(0,240,255,.18);
    border:2px solid #00f0ff;
    box-shadow:0 0 12px rgba(0,240,255,.6);
    pointer-events:none;
  }
  @media (pointer:coarse) { #boostBtn { display:flex; } #stick { display:block; } }
  @media (prefers-reduced-motion: reduce) { .btn { transition:none; } }
  #hitFlash {
    position:fixed; inset:0; pointer-events:none; z-index:5;
    box-shadow:inset 0 0 80px 24px rgba(255,45,85,0);
  }
  @keyframes selfHit {
    0%   { box-shadow:inset 0 0 80px 24px rgba(255,45,85,0.85); }
    100% { box-shadow:inset 0 0 80px 24px rgba(255,45,85,0); }
  }
  #hitFlash.flash { animation:selfHit 0.5s ease-out forwards; }
  @media (prefers-reduced-motion: reduce) { #hitFlash.flash { animation-duration:1ms; } }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="vignette"></div>
<div id="hitFlash"></div>

<div id="hud">SCORE <b id="score">0</b><br>BEST <b id="best">0</b></div>

<button id="boostBtn" aria-label="Boost">BOOST</button>
<div id="stick" aria-hidden="true"><div id="stickKnob"></div></div>

<div id="menu" class="overlay">
  <h1>NEON SERPENT</h1>
  <div class="sub">NEON ARCADE SNAKE</div>
  <button id="playBtn" class="btn">PLAY</button>
  <div class="hint">
    STEER — mouse · right joystick on touch<br>
    BOOST — hold click / space · boost button on touch (burns length)<br>
    Eat the glowing pellets. Don't hit anything — including yourself.
  </div>
</div>

<div id="dead" class="overlay hidden">
  <h1>YOU DIED</h1>
  <div class="score-line">SCORE <span id="finalScore">0</span></div>
  <div class="sub">BEST <span id="bestDead">0</span></div>
  <button id="respawnBtn" class="btn">RESPAWN</button>
</div>

<script type="module" src="./src/main.js"></script>
</body>
</html>
